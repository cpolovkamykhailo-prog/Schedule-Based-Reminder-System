name: Build JAR and List Files

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR with Maven
        run: mvn clean package -DskipTests -Dspotless.check.skip

      - name: Check generated files
        run: |
          echo "Listing target directory:"
          ls -R target
          echo "Listing installer-input directory:"
          ls -R target/installer-input || echo "Directory not found"

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/installer-input/app.jar
